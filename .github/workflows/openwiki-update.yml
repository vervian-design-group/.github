name: OpenWiki Update (reusable)

# Centrally-managed OpenWiki doc automation for all vervian-design-group repos.
# Consumers call this via a tiny stub. See README of this repo for the stub.
# Provider: OpenAI direct.

on:
  workflow_call:
    inputs:
      model_id:
        description: OpenAI model id for OpenWiki (OpenWiki supports gpt-5.4-mini, gpt-5.5)
        required: false
        type: string
        default: gpt-5.4-mini
      node_version:
        description: Node version
        required: false
        type: string
        default: "22"            # verify OpenWiki's required Node at pilot time
      openwiki_version:
        description: >-
          Exact OpenWiki version to install. PINNED ON PURPOSE. OpenWiki is 0.x,
          so any release may break consumers with no major-version signal, and
          this workflow runs unattended on a daily cron across every repo in the
          org. An unpinned `npm install --global openwiki` means one publish can
          turn the whole fleet red at once, which is exactly what happened on
          2026-07-17: 0.2.0 (published 2026-07-16 16:53 UTC) made YAML front
          matter mandatory, and theproductproduct + vervian-api both failed on
          their next cron with "<file> lacks YAML front matter."
          Bump this deliberately, after adding front matter to each consumer's
          openwiki/*.md, not by leaving it floating.
        required: false
        type: string
        default: "0.1.2"
    secrets:
      OPENAI_API_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: openwiki-${{ github.repository }}
      cancel-in-progress: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4          # verify latest major at pilot time
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4        # verify latest major at pilot time
        with:
          node-version: ${{ inputs.node_version }}
          # No dependency cache: OpenWiki is installed globally below, so there
          # are no project deps to cache. Enabling cache:"npm" made setup-node
          # require a root npm lockfile and hard-fail on pnpm/yarn repos.

      - name: Install OpenWiki
        run: npm install --global "openwiki@${{ inputs.openwiki_version }}"

      - name: Run OpenWiki
        run: openwiki --update --print     # verify current update flags at pilot time
        env:
          # OpenAI direct. OPENWIKI_PROVIDER selects the provider (default is openrouter).
          OPENWIKI_PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENWIKI_MODEL_ID: ${{ inputs.model_id }}

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7   # verify latest major at pilot time
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            Generated by the centralized OpenWiki service (vervian-design-group/.github).
