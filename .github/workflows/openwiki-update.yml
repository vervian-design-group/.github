name: OpenWiki Update (reusable)

# Centrally-managed OpenWiki doc automation for all vervian-design-group repos.
# Consumers call this via a tiny stub. See README of this repo for the stub.
# Provider: OpenAI direct.

on:
  workflow_call:
    inputs:
      model_id:
        description: OpenAI model id for OpenWiki (OpenWiki supports gpt-5.4-mini, gpt-5.5)
        required: false
        type: string
        default: gpt-5.4-mini
      node_version:
        description: Node version
        required: false
        type: string
        default: "22"            # verify OpenWiki's required Node at pilot time
    secrets:
      OPENAI_API_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: openwiki-${{ github.repository }}
      cancel-in-progress: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4          # verify latest major at pilot time
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4        # verify latest major at pilot time
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Run OpenWiki
        run: openwiki --update --print     # verify current update flags at pilot time
        env:
          # OpenAI direct. OPENWIKI_PROVIDER selects the provider (default is openrouter).
          OPENWIKI_PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENWIKI_MODEL_ID: ${{ inputs.model_id }}

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7   # verify latest major at pilot time
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            Generated by the centralized OpenWiki service (vervian-design-group/.github).
